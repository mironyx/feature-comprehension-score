receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    # resource_to_telemetry_conversion promotes resource attributes (e.g. feature.id)
    # to metric labels so Prometheus queries can filter by feature_id.
    resource_to_telemetry_conversion:
      enabled: true

processors:
  batch: {}

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]

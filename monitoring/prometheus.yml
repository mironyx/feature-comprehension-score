global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels: { host: local }

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels: { host: local }

  # Remote agent PC — hostname `remote` resolved via DNS/hosts on this machine.
  - job_name: otel-collector-remote
    static_configs:
      - targets: ["remote:8889"]
        labels: { host: remote }

  - job_name: node-exporter-remote
    static_configs:
      - targets: ["remote:9100"]
        labels: { host: remote }
